<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catcorn — Webbiecorn Mascotte</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at 50% 60%, #1a0a0f 0%, #0d0d0d 60%, #080808 100%);
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #scene {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }
    #glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(217,43,75,0.12) 0%, transparent 70%);
      pointer-events: none;
      transition: transform 0.1s ease-out;
    }
    #catcorn-img {
      position: relative;
      width: clamp(320px, 45vmin, 560px);
      height: auto;
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7)) drop-shadow(0 0 40px rgba(217,43,75,0.15));
      animation: float 4s ease-in-out infinite;
      transition: transform 0.08s ease-out;
      will-change: transform;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }
    #hint {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.2);
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase;
      pointer-events: none;
    }
    #label {
      position: fixed;
      top: 32px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.15);
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase;
      pointer-events: none;
    }
    #label span { color: #D92B4B; }
  </style>
</head>
<body>
  <div id="scene">
    <div id="glow"></div>
    <img id="catcorn-img" src="/Catcorn-mascotte-zonderachtergrond.png" alt="Catcorn mascotte" draggable="false" />
  </div>
  <div id="label">Webbie<span>corn</span> &nbsp;·&nbsp; mascotte</div>
  <div id="hint">Beweeg je muis</div>

  <script>
    const img  = document.getElementById('catcorn-img');
    const glow = document.getElementById('glow');
    let baseY = 0;
    let animT = 0;
    let mouseX = 0, mouseY = 0;
    let curX = 0, curY = 0;

    // Track float animation offset so we can add parallax on top
    function lerp(a, b, t) { return a + (b - a) * t; }

    window.addEventListener('mousemove', e => {
      mouseX = (e.clientX / window.innerWidth  - 0.5) * 2; // -1 to 1
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    function tick() {
      animT += 0.016;
      curX = lerp(curX, mouseX, 0.06);
      curY = lerp(curY, mouseY, 0.06);

      const floatY = Math.sin(animT * (Math.PI / 2)) * 14; // mirrors CSS animation
      const tiltX  = curY * -8;   // deg
      const tiltY  = curX *  8;
      const shiftX = curX * 18;   // px
      const shiftY = curY * 10;

      img.style.transform  = `translateX(${shiftX}px) translateY(${shiftY + floatY}px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
      img.style.animation  = 'none'; // handled in JS now

      glow.style.transform = `translate(${curX * 60 - 250}px, ${curY * 40 - 250}px)`;

      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
