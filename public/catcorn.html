<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catcorn — Webbiecorn Mascotte</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      height: 100vh;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #hint {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.2);
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase;
      pointer-events: none;
    }
    #label {
      position: fixed;
      top: 32px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.15);
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
    }
    #label span { color: #D92B4B; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="label">Webbie<span>corn</span> &nbsp;·&nbsp; mascotte</div>
  <div id="hint">Beweeg je muis</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    const img = new Image();
    img.src   = '/Catcorn-mascotte-zonderachtergrond.png';

    // Muis-tracking
    let mx = 0, my = 0;   // raw  -1..1
    let cx = 0, cy = 0;   // smoothed

    function lerp(a, b, t) { return a + (b - a) * t; }

    window.addEventListener('mousemove', e => {
      mx = (e.clientX / window.innerWidth  - 0.5) * 2;
      my = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let t = 0;

    function draw() {
      requestAnimationFrame(draw);
      t += 0.016;

      // Smooth cursor
      cx = lerp(cx, mx, 0.055);
      cy = lerp(cy, my, 0.055);

      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      if (!img.complete || !img.naturalWidth) return;

      // Bereken cat-afmetingen
      const scale = Math.min(W / img.naturalWidth, H / img.naturalHeight) * 0.75;
      const iw = img.naturalWidth  * scale;
      const ih = img.naturalHeight * scale;
      const ix = (W - iw) / 2;
      const iy = (H - ih) / 2 + H * 0.04;

      // Nek-pivot: ~46% van de hoogte van de afbeelding
      const pivotX = ix + iw * 0.50;
      const pivotY = iy + ih * 0.46;

      // ── LICHAAM (alles ónder de nek) — stil ──────────────────
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, pivotY - 2, W, H);
      ctx.clip();
      ctx.drawImage(img, ix, iy, iw, ih);
      ctx.restore();

      // ── HOOFD (alles bóven de nek) — volgt cursor ────────────
      const headAngle = cx * 0.22;
      const headNod   = cy * -0.12;

      ctx.save();
      ctx.translate(pivotX, pivotY);
      ctx.rotate(headAngle);
      ctx.transform(1, headNod * 0.15, 0, 1, 0, 0);
      ctx.translate(-pivotX, -pivotY);

      ctx.beginPath();
      ctx.rect(0, 0, W, pivotY + 12);
      ctx.clip();
      ctx.drawImage(img, ix, iy, iw, ih);
      ctx.restore();
    }

    img.onload = draw;
    if (img.complete) draw();
  </script>
</body>
</html>
